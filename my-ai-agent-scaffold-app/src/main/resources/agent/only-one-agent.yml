ai:
  agent:
    config:
      tables:
        onlyAgent:
          app-name: onlyAgent
          agent:
            agent-id: 100002
            agent-name: onlyAgent
            agent-desc: onlyAgent
          module:
            ai-api:
              base-url: https://api.deepseek.com
              api-key: ${DeepseekKey}
              completions-path: v1/chat/completions
              embeddings-path: v1/embeddings
            chat-model:
              model: deepseek-v4-flash
              tool-mcp-list:
                - sse:
                    name: csdn-utool
                    base-uri: http://localhost:8101/
                    sse-endpoint: sse
                    request-timeout: 5000
                - stdio:
                    name: server-filesystem
                    requestTimeout: 3000
                    serverParameters:
                      command: cmd.exe
                      args:
                        - "/c"
                        - "npx"
                        - "@modelcontextprotocol/server-filesystem"
                        - "E:\\Study\\xaiofuge\\my-ai-agent-scaffold\\my-ai-agent-scaffold-app\\data"
                - localMcp:
                    name: weatherServiceMcp
              skill-list:
                - type: resource
                  path: agent/skills


            agents:
              - name: onlyAgent
                description: ppt生成专家
                instruction: |
                  根据用户输入生成合适的ppt
                output-key: generated_code
            runner:
              agent-name: onlyAgent
              plugins:
                - mytestPlugin